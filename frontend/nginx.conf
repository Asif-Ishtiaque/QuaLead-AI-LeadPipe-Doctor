server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: every unknown path falls back to index.html so client-side
    # routing (react-router) handles it instead of a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|svg|png|jpg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
